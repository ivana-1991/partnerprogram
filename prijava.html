<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, initial-scale=1">
  <title>Prijava – Partner Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-800: #083c55; --blue-700: #0d5475; --blue-600: #136c93;
      --blue-500: #1a82ae; --blue-400: #2299c8;
      --grey-800: #1e1d1d; --grey-700: #2e2d2d; --grey-600: #403f3f;
      --grey-500: #545252; --grey-400: #696767; --grey-300: #888686;
      --grey-200: #a8a6a6; --grey-100: #bfbdbd; --grey-50: #d6d4d4;
      --bg-dropdown: #ddf3fa;
    }

    html, body {
      height: 100%; font-family: 'Inter', sans-serif;
      color: var(--grey-800); overflow: hidden;
    }

    /* ─── BACKGROUND ─── */
    body {
      background: #e9f4f9;
      position: relative;
    }
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    /* Blurred blobs */
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(72px); opacity: .85;
    }
    .blob-red {
      width: 480px; height: 360px;
      top: -120px; left: -100px;
      background: rgba(210, 95, 70, .55);
      border-radius: 55% 45% 60% 40%;
      transform: rotate(-20deg);
    }
    .blob-red2 {
      width: 260px; height: 180px;
      top: 60px; left: 80px;
      background: rgba(220, 130, 100, .35);
      border-radius: 40% 60% 50% 50%;
      transform: rotate(-35deg);
    }
    .blob-blue-bl {
      width: 520px; height: 400px;
      bottom: -80px; left: 50px;
      background: rgba(140, 200, 230, .55);
    }
    .blob-blue-br {
      width: 600px; height: 500px;
      bottom: -100px; right: -60px;
      background: rgba(160, 215, 240, .4);
    }
    .blob-blue-tr {
      width: 400px; height: 340px;
      top: -60px; right: 40px;
      background: rgba(200, 235, 248, .45);
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.18);
    }

    /* ─── TOP NAV LOGO ─── */
    .login-nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 64px; display: flex; align-items: center;
      padding: 0 40px; z-index: 10;
    }
    .login-nav a {
      display: flex; align-items: center; text-decoration: none;
      height: 29px;
    }

    /* ─── CENTERED LAYOUT ─── */
    .login-center {
      position: fixed; inset: 0; z-index: 5;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── CARD ─── */
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
      width: 527px;
      padding: 56px 56px 52px;
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
    }
    .login-card.hidden { display: none; }

    /* Animal icon */
    .card-icon { margin-bottom: 20px; }

    /* Title */
    .card-title {
      font-size: 28px; font-weight: 700; color: var(--grey-800);
      margin-bottom: 36px; text-align: center; line-height: 1.25;
    }

    /* ─── FORM ─── */
    .form-fields { width: 100%; display: flex; flex-direction: column; gap: 24px; margin-bottom: 28px; }
    .field-wrap { position: relative; width: 100%; }
    .field-input {
      width: 100%; height: 40px;
      border: 1px solid var(--grey-50); border-radius: 4px;
      padding: 0 12px 0 36px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--grey-800); background: #fff; outline: none;
      transition: border-color .15s;
    }
    .field-input::placeholder { color: var(--grey-400); }
    .field-input:focus { border-color: var(--blue-400); }
    .field-input.with-right { padding-right: 40px; }
    .field-icon-left {
      position: absolute; left: 10px; top: 20px;
      transform: translateY(-50%); color: var(--grey-400);
      display: flex; pointer-events: none;
      transition: color .15s;
    }
    .field-icon-right {
      position: absolute; right: 10px; top: 20px;
      transform: translateY(-50%); color: var(--grey-400);
      display: flex; cursor: pointer; background: none; border: none;
      padding: 0; transition: color .15s;
    }
    .field-icon-right:hover { color: var(--grey-600); }

    /* ─── ERROR STATE ─── */
    .field-input.error { border-color: #e53935; }
    .field-input.error + .field-icon-right { color: #e53935; }
    .field-icon-left.error { color: #e53935; }
    .field-err {
      font-size: 12px; color: #e53935; margin-top: 5px;
      padding-left: 2px; display: none; line-height: 1.4;
    }
    .field-err.show { display: block; }

    /* ─── SHAKE ─── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake .35s ease; }

    /* ─── SUCCESS ─── */
    .success-msg {
      display: none; width: 100%; background: #e8f7ed;
      border: 1px solid #a5d6b5; border-radius: 4px;
      padding: 12px 16px; font-size: 14px; color: #1b5e35;
      font-weight: 500; text-align: center; margin-bottom: 16px;
    }
    .success-msg.show { display: block; }

    /* ─── BUTTONS ─── */
    .btn-primary {
      width: 100%; height: 40px;
      background: var(--blue-500); color: #fff; border: none;
      border-radius: 4px; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s; margin-bottom: 16px;
      position: relative;
    }
    .btn-primary:hover:not(:disabled) { background: var(--blue-600); }
    .btn-primary:disabled { opacity: .7; cursor: not-allowed; }
    .btn-primary.loading { color: transparent; pointer-events: none; }
    .btn-primary.loading::after {
      content: ''; position: absolute;
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .btn-tertiary {
      background: none; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 14px;
      font-weight: 600; color: var(--blue-500); padding: 10px;
      transition: opacity .15s;
    }
    .btn-tertiary:hover { opacity: .75; }
  </style>
</head>

        <span class="field-icon-left" id="iconCpUser">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </span>
        <input class="field-input" type="text" placeholder="Korisnik" id="cpUser" autocomplete="username">
        <div class="field-err" id="errCpUser">Molimo unesite korisničko ime.</div>
      </div>
    </div>

    <div class="success-msg" id="cpSuccess">Email za promjenu lozinke je poslan!</div>
    <button class="btn-primary" id="cpBtn">Pošalji email za promjenu lozinke</button>
    <button class="btn-tertiary" id="backToLogin">Povratak na prijavu</button>
  </div>

<script>
  /* ── helpers ── */
  function setError(inputId, iconId, errId, msg) {
    const inp  = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    const err  = document.getElementById(errId);
    inp.classList.add('error');
    if (icon) icon.classList.add('error');
    if (err)  { err.textContent = msg; err.classList.add('show'); }
  }
  function clearError(inputId, iconId, errId) {
    const inp  = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    const err  = document.getElementById(errId);
    inp.classList.remove('error');
    if (icon) icon.classList.remove('error');
    if (err)  err.classList.remove('show');
  }
  function triggerShake(el) {
    el.classList.remove('shake');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('shake');
    el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  }

  /* ── card switching ── */
  const mode = new URLSearchParams(window.location.search).get('mode');
  if (mode === 'lozinka') {
    document.getElementById('cardLogin').classList.add('hidden');
    document.getElementById('cardChangePw').classList.remove('hidden');
  }
  document.getElementById('showChangePw').addEventListener('click', () => {
    document.getElementById('cardLogin').classList.add('hidden');
    document.getElementById('cardChangePw').classList.remove('hidden');
    history.replaceState(null, '', '?mode=lozinka');
  });
  document.getElementById('backToLogin').addEventListener('click', () => {
    document.getElementById('cardChangePw').classList.add('hidden');
    document.getElementById('cardLogin').classList.remove('hidden');
    // reset change-pw state
    clearError('cpUser','iconCpUser','errCpUser');
    document.getElementById('cpUser').value = '';
    document.getElementById('cpSuccess').classList.remove('show');
    const cpBtn = document.getElementById('cpBtn');
    cpBtn.classList.remove('loading'); cpBtn.disabled = false;
    history.replaceState(null, '', 'prijava.html');
  });

  /* ── real-time clear errors on typing ── */
  document.getElementById('loginUser').addEventListener('input', () => clearError('loginUser','iconUser','errUser'));
  document.getElementById('loginPass').addEventListener('input', () => clearError('loginPass','iconPass','errPass'));
  document.getElementById('cpUser').addEventListener('input', () => clearError('cpUser','iconCpUser','errCpUser'));

  /* ── LOGIN submit ── */
  function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    let valid = true;

    if (!user) { setError('loginUser','iconUser','errUser','Molimo unesite korisničko ime.'); valid = false; }
    if (!pass) { setError('loginPass','iconPass','errPass','Molimo unesite lozinku.'); valid = false; }

    if (!valid) {
      triggerShake(document.getElementById('cardLogin'));
      return;
    }

    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading'); btn.disabled = true;
    setTimeout(() => { window.location.href = 'intervencije.html'; }, 900);
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  /* ── CHANGE PASSWORD submit ── */
  function doChangePw() {
    const user = document.getElementById('cpUser').value.trim();
    if (!user) {
      setError('cpUser','iconCpUser','errCpUser','Molimo unesite korisničko ime.');
      triggerShake(document.getElementById('cardChangePw'));
      return;
    }
    const btn = document.getElementById('cpBtn');
    btn.classList.add('loading'); btn.disabled = true;
    setTimeout(() => {
      btn.classList.remove('loading'); btn.disabled = false;
      document.getElementById('cpSuccess').classList.add('show');
      document.getElementById('cpUser').value = '';
    }, 1000);
  }

  document.getElementById('cpBtn').addEventListener('click', doChangePw);
  document.getElementById('cpUser').addEventListener('keydown', e => { if (e.key === 'Enter') doChangePw(); });

  /* ── PASSWORD SHOW / HIDE ── */
  document.getElementById('togglePass').addEventListener('click', () => {
    const input = document.getElementById('loginPass');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  });
</script>
